# Netlify deployment configuration for img2css
# Fixes the "almost empty HTML page" issue caused by:
#   1. Wrong publish directory (must be `build/`, not repo root or `public/`)
#   2. Wrong asset base path (the original `homepage` field pointed to
#      https://javier.xyz/img2css/ which 404s on a Netlify root domain)

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA-style fallback so any path serves index.html (harmless for this app,
# useful if a path is opened directly).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
